# Deal Sniper AI Platform Configuration

# General platform settings
platform:
  name: "Deal Sniper AI"
  version: "0.1.0"
  environment: "development"  # development, staging, production
  debug: true
  log_level: "INFO"
  data_dir: "./data"

# Database configuration (Supabase PostgreSQL Cloud)
database:
  type: "sqlite"  # postgresql or sqlite
  host: "db.knypkhqcisbhgmhlzepc.supabase.co"
  pooled_host: "aws-0-us-east-1.pooler.supabase.com"  # For connection pooling
  pooled_port: 6543  # Pooler port
  port: 5432  # Cloud Supabase default
  database: "postgres"
  username: "postgres"
  password: "TTpoi9xS0iJ7TmgX"
  pool_size: 20
  max_overflow: 40
  echo: false
  sqlite_path: "./data/deal_sniper.db"  # Used when type is sqlite

# Supabase REST API configuration
supabase:
  url: ""  # Set via DS_SUPABASE_URL environment variable
  anon_key: ""  # Set via DS_SUPABASE_KEY
  service_role_key: ""  # Optional, for bypassing RLS

# Redis configuration (Celery broker and result backend)
redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  max_connections: 10

# Celery task queue
celery:
  worker_concurrency: 4
  task_serializer: "json"
  accept_content: ["json"]
  result_serializer: "json"
  timezone: "UTC"
  enable_utc: true
  beat_schedule:
    # Price monitoring tasks
    monitor_amazon:
      task: "deal_sniper_ai.price_watch_grid.tasks.monitor_retailer"
      schedule: 300.0  # seconds (5 minutes)
      args: ["amazon"]
    # monitor_walmart, monitor_target, monitor_home_depot disabled — add when retailer configured
    # Deal community monitoring (secondary source)
    monitor_slickdeals:
      task: "deal_sniper_ai.signal_scraper.tasks.scrape_deal_community"
      schedule: 600.0  # 10 minutes
      args: ["slickdeals"]
    monitor_reddit:
      task: "deal_sniper_ai.signal_scraper.tasks.scrape_deal_community"
      schedule: 900.0  # 15 minutes
      args: ["reddit"]
    # Analytics and optimization
    update_deal_weights:
      task: "deal_sniper_ai.analytics_engine.tasks.update_scoring_weights"
      schedule: 86400.0  # 24 hours
    update_performance_metrics:
      task: "deal_sniper_ai.analytics_engine.tasks.update_performance_metrics_task"
      schedule: 3600.0  # 1 hour (from analytics.performance_metrics.update_interval)
    cleanup_old_analytics_data:
      task: "deal_sniper_ai.analytics_engine.tasks.cleanup_old_analytics_data_task"
      schedule: 86400.0  # 24 hours
    clean_old_data:
      task: "deal_sniper_ai.database.tasks.clean_old_records"
      schedule: 43200.0  # 12 hours
    # Growth engine tasks
    growth_daily_digest:
      task: "deal_sniper_ai.growth_engine.tasks.generate_daily_digest_task"
      schedule: 86400.0  # Daily at configured time (send_time in growth.daily_digest)
    growth_update_leaderboard:
      task: "deal_sniper_ai.growth_engine.tasks.update_leaderboard_task"
      schedule: 86400.0  # Daily
    # Posting engine tasks
    post_approved_deals:
      task: "deal_sniper_ai.posting_engine.tasks.post_approved_deals_task"
      schedule: 300.0  # Every 5 minutes
      args: [10]  # Limit to 10 deals
    retry_failed_posts:
      task: "deal_sniper_ai.posting_engine.tasks.retry_failed_posts_task"
      schedule: 600.0  # Every 10 minutes
    test_platform_connections:
      task: "deal_sniper_ai.posting_engine.tasks.test_platform_connections_task"
      schedule: 3600.0  # Every hour
    cleanup_old_exports:
      task: "deal_sniper_ai.posting_engine.tasks.cleanup_old_exports_task"
      schedule: 86400.0  # Daily
      args: [30]  # Cleanup files older than 30 days
    growth_check_viral_deals:
      task: "deal_sniper_ai.growth_engine.tasks.detect_viral_deals_task"
      schedule: 3600.0   # Hourly
    growth_check_re_engagement:
      task: "deal_sniper_ai.growth_engine.tasks.check_re_engagement_task"
      schedule: 86400.0  # Daily
    growth_generate_report:
      task: "deal_sniper_ai.growth_engine.tasks.generate_growth_report_task"
      schedule: 604800.0 # Weekly
    growth_process_referrals:
      task: "deal_sniper_ai.growth_engine.tasks.process_pending_referrals_task"
      schedule: 3600.0   # Hourly
    # Glitch detection tasks
    periodic_glitch_detection:
      task: "deal_sniper_ai.glitch_detector.tasks.periodic_glitch_detection_task"
      schedule: 1800.0  # Every 30 minutes
    recheck_glitch_candidates:
      task: "deal_sniper_ai.glitch_detector.tasks.recheck_glitch_candidates_task"
      schedule: 3600.0  # Every hour
    cleanup_old_glitch_data:
      task: "deal_sniper_ai.glitch_detector.tasks.cleanup_old_glitch_data_task"
      schedule: 86400.0  # Daily

