# Deal communities to monitor (secondary sources)
deal_communities:
  slickdeals:
    enabled: true
    base_url: "https://slickdeals.net"
    rss_url: "https://slickdeals.net/newsearch.php?mode=frontpage&searcharea=deals&searchin=first&rss=1"
    scrape_interval: 600  # seconds
  reddit:
    enabled: true
    base_url: "https://www.reddit.com"
    subreddits:
      - "buildapcsales"
      - "GameDeals"
      - "PS4Deals"
      - "NintendoSwitchDeals"
    scrape_interval: 900
  telegram:
    enabled: false  # Requires API keys
    channels:
      - "@dealschannel"
    scrape_interval: 300

# Anti-blocking configuration
anti_blocking:
  user_agents:
    source_urls:
      - "https://user-agents.net/"
      - "https://developers.whatismybrowser.com/useragents/explore/"
    refresh_interval: 86400  # seconds (24 hours)
    min_success_rate: 0.7  # Remove user agents with <70% success rate
  proxies:
    enabled: false
    source_urls:
      - "https://free-proxy-list.net/"
      - "https://www.sslproxies.org/"
    refresh_interval: 3600  # 1 hour
    max_proxies: 100
    test_url: "https://httpbin.org/ip"
    timeout: 10
  request_throttling:
    min_delay: 1.0  # seconds
    max_delay: 5.0
    exponential_backoff: true
    backoff_factor: 2
  session_management:
    max_requests_per_session: 100
    session_rotation: true
    cookie_persistence: true

# Affiliate programs configuration
affiliate_programs:
  amazon_associates:
    enabled: true
    base_url: "https://www.amazon.com"
    tag_param: "tag"
    tag_value: "bidyarddeals-20"  # Replace with your Amazon Associates tag
  walmart_affiliate:
    enabled: false
    base_url: "https://www.walmart.com"
    partner_id_param: "affiliate"
    partner_id: ""  # Your Walmart Affiliate partner ID
  target_affiliate:
    enabled: false
    base_url: "https://www.target.com"
    account_id_param: "affiliate"
    account_id: ""  # Your Target Affiliate account ID
  home_depot_affiliate:
    enabled: false
    base_url: "https://www.homedepot.com"
    account_id_param: "affiliate"
    account_id: ""  # Your Home Depot Affiliate account ID

# Deal scoring algorithm weights (auto-adjusted based on performance)
deal_scoring:
  base_weights:
    price_drop_percent: 0.25
    absolute_savings: 0.15
    historical_low: 0.20
    coupon_available: 0.10
    retailer_reputation: 0.10
    category_demand: 0.05
    time_sensitivity: 0.10
    community_signal: 0.05
  min_score_threshold: 70  # Minimum score to consider as deal candidate
  max_score_threshold: 95  # Score above which deal is considered "extreme"

# Anomaly detection settings
anomaly_detection:
  z_score_threshold: 3.0  # Price changes beyond 3 standard deviations
  isolation_forest_contamination: 0.1  # Expected proportion of anomalies
  min_data_points: 10  # Minimum historical prices needed for detection
  lookback_period: 30  # Days to consider for historical analysis

# Glitch detection rules
glitch_detection:
  price_drop_threshold: 0.6  # 60% drop from historical average
  price_absolute_threshold: 10.0  # Absolute price below $10
  combination_discount_threshold: 0.8  # 80% off when combined with coupon
  check_duration: 3600  # Re-check glitch candidates within 1 hour

# Coupon detection and validation
coupon_detection:
  min_success_rate: 0.3  # Minimum success rate to consider coupon active
  validation_interval: 86400  # Re-validate coupons every 24 hours (seconds)
  max_validation_attempts: 3  # Max attempts before marking as invalid
  detection_timeout: 30  # Seconds to wait for page load
  batch_size: 50  # Number of coupons to process in batch
  retry_delay: 2.0  # Seconds between retry attempts
  success_rate_decay: 0.95  # Decay factor for success rate over time

  # Retailer-specific settings
  retailer_settings:
    amazon:
      enabled: true
      detection_methods: ["dom", "text", "api"]
      validation_method: "cart_page"
      max_coupons_per_product: 5
    walmart:
      enabled: false
      detection_methods: ["dom", "text"]
      validation_method: "cart_page"
      max_coupons_per_product: 3
    target:
      enabled: false
      detection_methods: ["dom", "text"]
      validation_method: "checkout_page"
      max_coupons_per_product: 2
    home_depot:
      enabled: false
      detection_methods: ["dom"]
      validation_method: "cart_page"
      max_coupons_per_product: 1

# Posting engine configuration
posting:
  telegram:
    enabled: true
    bot_token: ""  # Set via TELEGRAM_BOT_TOKEN env var
    channel_id: "-1003739890278"  # Coupons, Deals, and Steals Chat (supergroup)
    post_format: |
      🔥 DEAL ALERT: {title}
      💰 Price: ${current_price} (was ${original_price}, {discount_percent}% off)
      🛒 Link: {affiliate_link}
      📊 Score: {score}/100
      ⏰ Detected: {detection_time}
    min_score: 80
  discord:
    enabled: false
    webhook_url: ""
    post_format: "embed"  # embed or plain
    min_score: 75
  twitter:
    enabled: false
    api_key: ""
    api_secret: ""
    access_token: ""
    access_secret: ""
    min_score: 85
  tiktok:
    enabled: false  # Requires manual posting for now

# Growth engine settings
growth:
  daily_digest:
    enabled: true
    send_time: "18:00"  # 6 PM local time
    max_deals_per_digest: 10
  referral_program:
    enabled: false
    reward_per_referral: 1.0  # $1 credit per successful referral
  leaderboard:
    enabled: true
    update_interval: 86400  # Daily

# Analytics and monitoring
analytics:
  track_clicks: true
  track_conversions: true
  revenue_tracking: true
  performance_metrics:
    update_interval: 3600  # hourly
    retention_days: 90
  alerting:
    enabled: true
    email_alerts: false
    telegram_alerts: false
    critical_errors: true

# API server configuration
api:
  host: "0.0.0.0"
  port: 8001
  workers: 4
  reload: true  # Auto-reload on code changes (development only)
  cors_origins:
    - "http://localhost:3000"
    - "https://deals-coupons-ai.vercel.app"
  rate_limiting:
    enabled: true
    max_requests_per_minute: 60